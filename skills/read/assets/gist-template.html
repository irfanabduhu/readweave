<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BOOK_TITLE}} &mdash; Book Club</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Caveat:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --cream: #FAF6F0;
    --page: #FFFDF8;
    --ink: #2C2321;
    --ink-light: #4A3C36;
    --ink-lighter: #8B7468;
    --accent: #8B3A3A;
    --gold: #B8963E;
    --gold-soft: rgba(184, 150, 62, 0.10);
    --divider: #D4C5B5;
    --shadow: rgba(44, 35, 33, 0.06);
    --page-shadow: rgba(44, 35, 33, 0.12);
    --note-ink: #6B5D52;
    --note-accent: #9B6B4A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 18px; }

  body {
    font-family: 'EB Garamond', 'Georgia', serif;
    background: #E8E0D4;
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ───── PROGRESS ───── */
  .progress-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px; background: rgba(0,0,0,0.04); z-index: 900;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    width: 0%;
  }

  /* ───── SLIDE COUNTER ───── */
  .slide-counter {
    position: fixed; top: 20px; right: 24px; z-index: 900;
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink-lighter);
  }

  /* ───── NAV TOGGLE ───── */
  .nav-toggle {
    position: fixed; top: 20px; left: 24px; z-index: 1000;
    background: var(--page); border: 1px solid var(--divider);
    border-radius: 5px; padding: 8px 14px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.6rem;
    font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-lighter);
    transition: all 0.3s ease;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .nav-toggle:hover { background: var(--ink); color: var(--page); }
  .nav-toggle.hidden { opacity: 0; pointer-events: none; }

  /* ───── SIDEBAR ───── */
  .sidebar {
    position: fixed; top: 0; left: 0; width: 340px; height: 100vh;
    background: var(--ink); color: var(--page); z-index: 999;
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    display: flex; flex-direction: column;
    box-shadow: 4px 0 24px rgba(0,0,0,0.3);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-header h2 {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 2px;
  }
  .sidebar-header p {
    font-family: 'Inter', sans-serif; font-size: 0.55rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .sidebar-nav {
    flex: 1; overflow-y: auto; padding: 12px 0;
  }
  .sidebar-nav::-webkit-scrollbar { width: 3px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  .sidebar-nav button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; padding: 7px 24px;
    font-family: 'EB Garamond', serif; font-size: 0.85rem;
    color: rgba(255,255,255,0.5); cursor: pointer;
    transition: all 0.2s ease; line-height: 1.35; position: relative;
  }
  .sidebar-nav button:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.03); }
  .sidebar-nav button.active { color: var(--gold); background: rgba(184,150,62,0.06); }
  .sidebar-nav button.active::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--gold);
  }
  .sidebar-nav button .num {
    font-family: 'Inter', sans-serif; font-size: 0.5rem;
    font-weight: 600; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.2); margin-right: 8px;
  }
  .sidebar-nav button.active .num { color: var(--gold); }
  .sidebar-close {
    position: absolute; top: 20px; right: 16px;
    background: none; border: none; color: rgba(255,255,255,0.3);
    font-size: 1.3rem; cursor: pointer; line-height: 1;
  }
  .sidebar-close:hover { color: #fff; }
  .sidebar-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    z-index: 998; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .sidebar-overlay.visible { opacity: 1; pointer-events: all; }

  /* ───── SLIDE LAYOUT ───── */
  .slides-wrapper {
    width: 100vw; height: 100vh;
    position: relative;
  }

  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
    transform: translateY(12px);
    padding: 40px 20px;
  }
  .slide.active {
    opacity: 1; pointer-events: all; transform: translateY(0);
  }

  /* ───── PAGE SPREAD (page + margin) ───── */
  .page-spread {
    display: flex;
    align-items: flex-start;
    gap: 0;
    max-height: calc(100vh - 80px);
  }

  /* The book page */
  .page {
    background: var(--page);
    width: 660px;
    min-height: 480px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    border-radius: 3px 0 0 3px;
    box-shadow:
      0 1px 3px var(--shadow),
      0 8px 32px var(--page-shadow),
      inset 0 0 80px rgba(0,0,0,0.01);
    position: relative;
    scrollbar-width: thin;
    scrollbar-color: var(--divider) transparent;
    flex-shrink: 0;
  }
  .page::-webkit-scrollbar { width: 4px; }
  .page::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }

  .page::before {
    content: '';
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.03) 20%, rgba(0,0,0,0.04) 80%, transparent);
  }

  .page-content {
    padding: 48px 52px 44px;
  }

  /* ───── MARGIN NOTES ───── */
  .margin {
    width: 220px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    padding: 48px 20px 44px 24px;
    flex-shrink: 0;
    scrollbar-width: none;
    position: relative;
  }
  .margin::-webkit-scrollbar { display: none; }

  .margin::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom,
      transparent 5%,
      var(--divider) 15%,
      var(--divider) 85%,
      transparent 95%
    );
  }

  .margin-note {
    margin-bottom: 1.4rem;
    position: relative;
    padding-left: 12px;
    border-left: 2px solid transparent;
    transition: border-color 0.3s ease;
  }
  .margin-note:hover {
    border-left-color: var(--gold);
  }

  .margin-note .note-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.45rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--note-accent);
    margin-bottom: 4px;
    display: block;
  }

  .margin-note p {
    font-family: 'Caveat', cursive;
    font-size: 0.95rem;
    line-height: 1.45;
    color: var(--note-ink);
    font-weight: 400;
  }

  .margin-note .note-connector {
    position: absolute;
    left: -14px;
    top: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--divider);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .margin-note:hover .note-connector {
    opacity: 1;
  }

  /* No-margin slides (title, overview, discussion) */
  .slide.no-margin .page {
    border-radius: 3px;
  }
  .slide.no-margin .page::after {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 30px;
    background: linear-gradient(to right, transparent, rgba(0,0,0,0.015));
    pointer-events: none;
  }

  /* ───── PAGE TYPOGRAPHY ───── */
  .page h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 2.6rem;
    line-height: 1.15; color: var(--ink);
    margin-bottom: 0.4rem; letter-spacing: -0.01em;
  }
  .page h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400; font-size: 1.7rem;
    line-height: 1.25; color: var(--ink);
    margin-bottom: 0.2rem;
  }
  .page-chapter {
    font-family: 'Inter', sans-serif;
    font-size: 0.55rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); display: block; margin-bottom: 10px;
  }
  .page-divider {
    width: 50px; height: 1px;
    background: var(--divider); margin: 1.4rem 0;
  }
  .page-ornament {
    text-align: center; margin: 1.2rem 0;
    color: var(--divider); font-size: 0.9rem;
    letter-spacing: 0.6em;
  }

  /* ───── EXCERPT STYLING ───── */
  .excerpt {
    font-size: 1.2rem;
    line-height: 1.9;
    color: var(--ink);
    text-align: justify;
    hyphens: auto;
    -webkit-hyphens: auto;
    text-indent: 0;
  }
  .excerpt + .excerpt {
    text-indent: 1.8em;
    margin-top: 0;
  }
  .excerpt .elide {
    color: var(--ink-lighter);
    font-style: normal;
    letter-spacing: 0.05em;
  }
  .excerpt em { font-style: italic; }

  .excerpt.drop-cap::first-letter {
    float: left;
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.8rem;
    line-height: 0.8;
    padding-right: 8px;
    padding-top: 6px;
    color: var(--accent);
    font-weight: 400;
  }

  .page-source {
    margin-top: 1.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-lighter);
    text-align: right;
  }

  /* ───── COMMENTARY ───── */
  .commentary {
    font-size: 1.15rem;
    line-height: 1.8;
    color: var(--ink-light);
    margin-bottom: 0.7rem;
  }
  .commentary strong { color: var(--ink); font-weight: 600; }
  .commentary em { font-style: italic; color: var(--ink); }

  .concept-card {
    background: var(--cream);
    border: 1px solid rgba(0,0,0,0.04);
    border-radius: 4px;
    padding: 1rem 1.2rem;
    margin: 0.8rem 0;
  }
  .concept-card .card-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.55rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 0.4rem;
  }
  .concept-card p {
    font-size: 1.05rem; line-height: 1.7; color: var(--ink-light);
    margin-bottom: 0.3rem;
  }

  .cycle-diagram {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 6px; margin: 1.2rem 0; align-items: center;
  }
  .cycle-step {
    background: var(--cream); border: 1px solid var(--divider);
    border-radius: 4px; padding: 6px 12px;
    font-family: 'Inter', sans-serif; font-size: 0.65rem;
    font-weight: 500; color: var(--ink-light);
  }
  .cycle-step.hl { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cycle-arrow { font-size: 0.85rem; color: var(--divider); }

  .discussion-q {
    background: var(--gold-soft);
    border-radius: 4px; padding: 0.8rem 1rem;
    margin: 0.5rem 0; font-size: 1.1rem;
    line-height: 1.6; color: var(--ink);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .discussion-q .qn {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 1.2rem;
    color: var(--accent); flex-shrink: 0; line-height: 1.5;
  }

  .voice-card {
    background: var(--cream); border-radius: 4px;
    padding: 1rem 1.2rem; margin: 0.7rem 0;
    border-left: 2px solid var(--accent);
  }
  .voice-card .speaker {
    font-family: 'Inter', sans-serif; font-size: 0.55rem;
    font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 0.3rem;
  }
  .voice-card p {
    font-style: italic; font-size: 1.1rem;
    line-height: 1.65; color: var(--ink); margin: 0;
  }

  /* ───── TITLE SLIDE ───── */
  .title-page .page-content {
    text-align: center;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 480px;
  }
  .title-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem; color: var(--gold); opacity: 0.3;
    margin-bottom: 1.2rem; letter-spacing: 0.4em;
  }
  .title-page h1 { font-size: 2.8rem; margin-bottom: 0.3rem; }
  .title-page .author {
    font-family: 'Inter', sans-serif; font-size: 0.65rem;
    font-weight: 500; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-lighter); margin-bottom: 2rem;
  }
  .title-page .tagline {
    font-style: italic; font-size: 1.1rem;
    color: var(--ink-lighter); max-width: 460px;
    line-height: 1.7;
  }
  .begin-hint {
    margin-top: 2.5rem;
    font-family: 'Inter', sans-serif; font-size: 0.55rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--divider); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
  }

  /* ───── NAV ARROWS ───── */
  .nav-arrows {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; gap: 6px; z-index: 900;
  }
  .nav-arrows button {
    width: 40px; height: 40px;
    border: 1px solid var(--divider); background: var(--page);
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; color: var(--ink-light);
    font-size: 1rem; box-shadow: 0 1px 4px var(--shadow);
  }
  .nav-arrows button:hover { background: var(--ink); color: var(--page); border-color: var(--ink); }
  .nav-arrows button:disabled { opacity: 0.25; cursor: default; background: var(--page); color: var(--ink-lighter); }

  @media (max-width: 900px) {
    .margin { display: none; }
    .page { border-radius: 3px; width: 100%; max-width: 660px; }
    .page::after {
      content: '';
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 30px;
      background: linear-gradient(to right, transparent, rgba(0,0,0,0.015));
      pointer-events: none;
    }
  }
  @media (max-width: 768px) {
    .page-content { padding: 36px 32px 32px; }
    .page h1 { font-size: 2rem; }
    .page h2 { font-size: 1.4rem; }
    .title-page h1 { font-size: 2rem; }
    .excerpt { font-size: 1.1rem; line-height: 1.8; }
    .sidebar { width: 85vw; }
  }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="slide-counter" id="slideCounter"></div>
<button class="nav-toggle" id="navToggle">Contents</button>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
  <button class="sidebar-close" id="sidebarClose">&times;</button>
  <div class="sidebar-header">
    <h2>{{BOOK_TITLE}}</h2>
    <p>{{SIDEBAR_SUBTITLE}}</p>
  </div>
  <div class="sidebar-nav" id="sidebarNav"></div>
</nav>

<div class="nav-arrows">
  <button id="prevBtn">&larr;</button>
  <button id="nextBtn">&rarr;</button>
</div>

<div class="slides-wrapper">

<!-- ═══════════════════════════════════════════════════════════════
     INSERT SLIDES HERE

     Slide types (see references/design-guide.md for full HTML):

     1. Title slide:      class="slide active no-margin" data-title="Title"
     2. Overview slide:    class="slide no-margin" data-title="..."
     3. Excerpt slides:    class="slide" data-title="..."  (with .margin div)
     4. Discussion slide:  class="slide no-margin" data-title="Discussion"
     5. Closing slide:     class="slide no-margin" data-title="Closing"

     The first slide should have class="active" to be visible on load.
     ═══════════════════════════════════════════════════════════════ -->

</div>

<script>
(function() {
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  let cur = parseInt(location.hash.replace('#slide-',''),10) || 0;
  if (cur < 0 || cur >= total) cur = 0;

  const fill = document.getElementById('progressFill');
  const counter = document.getElementById('slideCounter');
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  const sidebar = document.getElementById('sidebar');
  const nav = document.getElementById('sidebarNav');
  const overlay = document.getElementById('sidebarOverlay');
  const toggle = document.getElementById('navToggle');
  const close = document.getElementById('sidebarClose');

  slides.forEach((s, i) => {
    const b = document.createElement('button');
    const t = s.dataset.title || 'Slide '+(i+1);
    b.innerHTML = '<span class="num">'+String(i+1).padStart(2,'0')+'</span>'+t;
    b.onclick = () => { go(i); closeSB(); };
    nav.appendChild(b);
  });

  function update() {
    slides.forEach((s, i) => {
      s.classList.toggle('active', i===cur);
      if (i===cur) {
        const p = s.querySelector('.page');
        if (p) p.scrollTop = 0;
        const m = s.querySelector('.margin');
        if (m) m.scrollTop = 0;
      }
    });
    fill.style.width = (total>1 ? cur/(total-1)*100 : 0)+'%';
    counter.textContent = (cur+1)+' / '+total;
    prev.disabled = cur===0;
    next.disabled = cur===total-1;
    nav.querySelectorAll('button').forEach((b,i) => b.classList.toggle('active', i===cur));
  }

  function go(n) { if(n>=0&&n<total){cur=n;location.hash='slide-'+n;update();} }
  window.addEventListener('hashchange', () => {
    const h = parseInt(location.hash.replace('#slide-',''),10);
    if (!isNaN(h) && h >= 0 && h < total && h !== cur) { cur = h; update(); }
  });
  function openSB() { sidebar.classList.add('open'); overlay.classList.add('visible'); toggle.classList.add('hidden'); }
  function closeSB() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); toggle.classList.remove('hidden'); }

  prev.onclick = () => go(cur-1);
  next.onclick = () => go(cur+1);
  toggle.onclick = openSB;
  close.onclick = closeSB;
  overlay.onclick = closeSB;

  document.addEventListener('keydown', e => {
    if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '&&!e.shiftKey){e.preventDefault();go(cur+1);}
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp'||e.key===' '&&e.shiftKey){e.preventDefault();go(cur-1);}
    else if(e.key==='Escape') closeSB();
  });

  let tx=0,ty=0;
  document.addEventListener('touchstart', e=>{tx=e.changedTouches[0].screenX;ty=e.changedTouches[0].screenY;},{passive:true});
  document.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].screenX-tx, dy=e.changedTouches[0].screenY-ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>60){if(dx<0)go(cur+1);else go(cur-1);}
  },{passive:true});

  update();
})();
</script>
</body>
</html>
